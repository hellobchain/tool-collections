services:
  markitdown-api:
    image: markitdown-api:v1.0.0
    container_name: markitdown-api
    ports:
      - "8001:8001"
    environment:
      - API_KEY=${API_KEY:-your-secret-api-key-change-me}
      - RATE_LIMIT=${RATE_LIMIT:-10/minute}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-50}
      - ENABLE_LLM=${ENABLE_LLM:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - CONVERT_TIMEOUT=${CONVERT_TIMEOUT:-120}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - markitdown-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'

networks:
  markitdown-network:
    driver: bridge