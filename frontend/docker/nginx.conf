server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SPA: serve index.html for non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # weekly-assistant 反向代理到后端
    location /weekly-assistant/ {
        proxy_pass http://backend:8000/weekly-assistant/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    # textparse 反向代理到后端
    location /textparse/ {
        proxy_pass http://docling-service:5001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    # md2docx 反向代理到后端
    location /md2docx/ {
        proxy_pass http://md2docx-service:8002/md2docx/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

        # API 反向代理到后端
    location /weekly-assistant/week/generate-stream {
        proxy_pass http://backend:8000/weekly-assistant/week/generate-stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
    }
}
