services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: weekly123
      POSTGRES_DB: weekly_assistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: weekly-assistant:v1.0.0
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: weekly123
      DB_NAME: weekly_assistant
      JWT_SECRET: ${JWT_SECRET:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-}
      DEEPSEEK_MAX_TOKENS: ${DEEPSEEK_MAX_TOKENS:-}
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: weekly-assistant-web:v1.0.0
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
      
volumes:
  pgdata:
